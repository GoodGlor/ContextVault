name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint, type-check, tests
    runs-on: ubuntu-latest

    # Postgres + pgvector, matching docker-compose, so the DB-backed tests and the
    # vector-extension migration run for real.
    services:
      db:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: contextvault
          POSTGRES_PASSWORD: contextvault
          POSTGRES_DB: contextvault
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U contextvault -d contextvault"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://contextvault:contextvault@localhost:5432/contextvault
      # >=32 bytes keeps PyJWT from emitting insecure-key warnings; CI-only value.
      SECRET_KEY: ci-secret-key-that-is-at-least-32-bytes-long

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync

      - name: Ruff lint
        run: uv run ruff check src tests

      - name: Ruff format check
        run: uv run ruff format --check src tests

      - name: Type-check (mypy)
        run: uv run mypy

      - name: Apply migrations
        run: uv run alembic upgrade head

      - name: Tests
        run: uv run pytest
